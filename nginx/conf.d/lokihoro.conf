# ============================================================================
# Nginx reverse proxy for LOKI HORO — destiny.lokeshmani.com
#
# Port 80  : serves the ACME (Let's Encrypt) challenge, redirects all other
#            traffic to HTTPS.
# Port 443 : terminates TLS and proxies to the app container (app:5000).
#
# IMPORTANT: the 443 server block below is COMMENTED OUT on first boot because
# the certificate does not exist yet — nginx would refuse to start. Follow
# DEPLOY.md: bring up with HTTP only, issue the cert with certbot, then
# uncomment the 443 block and reload nginx.
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name destiny.lokeshmani.com;

    # Let's Encrypt HTTP-01 challenge files.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else -> HTTPS. (Before the cert exists, comment this redirect
    # out and add `location / { proxy_pass http://app:5000; ... }` if you want
    # to test over plain HTTP first — but note the __Host- session cookie needs
    # HTTPS, so log in only after TLS is up.)
    location / {
        return 301 https://$host$request_uri;
    }
}

