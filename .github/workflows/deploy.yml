name: CI & Deploy to Hostinger VPS

# Runs on every push to master. First it type-checks and builds the app.
# Only if that succeeds does it SSH into the VPS, pull the latest code,
# and rebuild the Docker containers so the live site updates automatically.

on:
  push:
    branches: [master]
  workflow_dispatch: {}   # lets you trigger a deploy manually from the Actions tab

concurrency:
  group: deploy-master
  cancel-in-progress: false   # don't cancel an in-flight deploy; queue instead

jobs:
  # ---------------------------------------------------------------------------
  # 1) BUILD GATE — must pass before we touch the server
  # ---------------------------------------------------------------------------
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # 2) DEPLOY — only runs if the build job succeeded
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    # Extra guard: only deploy for real pushes / manual runs to master
    if: github.ref == 'refs/heads/master'
    steps:
      - name: SSH in, pull, and rebuild
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true   # abort on first failing command
          script: |
            set -e
            cd /opt/lokihoro
            echo "==> Pulling latest code"
            git fetch --all
            git reset --hard origin/master
            echo "==> Rebuilding containers"
            docker compose up -d --build
            echo "==> Pruning old images"
            docker image prune -f
            echo "==> Deploy complete"
            docker compose ps
